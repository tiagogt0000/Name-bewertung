<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projektbewertung V3</title>
<style>
:root{
--gold:#fbbf24;
--gold2:#f59e0b;
--text:#f8fafc;
}
*{box-sizing:border-box}
body{
margin:0;
min-height:100vh;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
color:var(--text);
background:
radial-gradient(circle at top left,#5b21b6 0%,transparent 35%),
radial-gradient(circle at top right,#7c3aed 0%,transparent 30%),
linear-gradient(135deg,#050816,#0f172a);
padding:20px;
}
.container{max-width:950px;margin:auto}
.card,.gruppe{
background:rgba(255,255,255,.06);
backdrop-filter:blur(18px);
border:1px solid rgba(251,191,36,.15);
border-radius:24px;
padding:24px;
margin-bottom:20px;
box-shadow:0 10px 40px rgba(0,0,0,.35);
}
h1{text-align:center;font-size:42px}
input[type=text]{
width:100%;

padding:18px 22px;

border-radius:22px;

border:1px solid rgba(255,255,255,.10);

background:rgba(17,24,39,.75);

color:#f8fafc;

font-size:17px;

font-weight:500;

outline:none;

transition:all .25s ease;

box-shadow:
0 8px 24px rgba(0,0,0,.25),
inset 0 1px 0 rgba(255,255,255,.04);
}

input[type=text]::placeholder{
color:rgba(248,250,252,.45);
}

input[type=text]:hover{
border-color:rgba(251,191,36,.25);
}

input[type=text]:focus{

border-color:#fbbf24;

background:rgba(15,23,42,.92);

box-shadow:
0 0 0 4px rgba(251,191,36,.12),
0 12px 30px rgba(0,0,0,.35);

transform:translateY(-1px);
}
button{
width:100%;padding:16px;border:none;border-radius:16px;
background:linear-gradient(135deg,var(--gold),var(--gold2));
font-weight:700;font-size:18px;cursor:pointer;
}
.slider{width:100%}
.wert{text-align:right;color:var(--gold);font-weight:bold}
.loaderwrap{
position:fixed;inset:0;background:rgba(0,0,0,.6);
display:none;align-items:center;justify-content:center;flex-direction:column;
backdrop-filter:blur(8px);z-index:9999
}
.loader{
width:70px;height:70px;border-radius:50%;
border:6px solid rgba(255,255,255,.15);
border-top:6px solid var(--gold);
animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.inputContainer{
display:flex;
align-items:center;
width:100%;
height:62px;

background:linear-gradient(
135deg,
rgba(251,191,36,.20),
rgba(251,191,36,.08)
);

border:1px solid rgba(251,191,36,.25);

border-radius:18px;

padding:0 16px;

box-shadow:
0 10px 30px rgba(0,0,0,.30),
inset 0 1px 0 rgba(255,255,255,.08);

margin:6px 0;
}

.icon{
font-size:20px;
margin-right:12px;
opacity:.9;
}

.inputContainer input{
flex:1;
height:100%;
border:none !important;
outline:none !important;
background:transparent !important;
box-shadow:none !important;
padding:0 !important;
margin:0 !important;
font-size:17px;
color:#fff;
}

.inputContainer input::placeholder{
color:rgba(255,255,255,.45);
}

.success{text-align:center;padding:50px}
</style>
</head>
<body>
<div class="loaderwrap" id="loader">
<div class="loader"></div>
<h2>Lädt...</h2>
</div>

<div class="container">
<h1>📋 Projektbewertung</h1>

<div class="card">
<div class="inputContainer">
<span class="icon">🔑</span>
<input id="code" placeholder="Projektcode">
</div>
<br><br>
<button onclick="laden()">Projekt laden</button>
<div id="fehler"></div>
</div>

<div id="projekt"></div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxeoaj9MlKorhn9-VqiUM3JgK1KwJMWcMv4J9ZPN7vhDAhOqF0_rQNB82e6zZ5aD30e/exec";
let aktuellesProjekt=null;

function showLoader(v){
document.getElementById('loader').style.display=v?'flex':'none';
}

async function laden(){
const code=document.getElementById('code').value.trim();
if(!code)return;
showLoader(true);
try{
const r=await fetch(API,{method:'POST',body:JSON.stringify({action:'getProject',code})});
const projekt=await r.json();
aktuellesProjekt=projekt;
anzeigen(projekt);
}finally{showLoader(false);}
}

function anzeigen(projekt){
let html=`<div class="card"><h2>${projekt.titel}</h2><p>Klasse ${projekt.klasse}</p><div class="inputContainer">
<span class="icon">👤</span>
<input id="schueler" placeholder="Dein Name">
</div></div>`;

projekt.gruppen.forEach(gruppe=>{
html+=`<div class="gruppe"><h2>${gruppe}</h2>`;
projekt.kriterien.forEach(k=>{
const id=gruppe+"_"+k;
html+=`<p>${k}</p>
<div class="wert" id="wert_${id}">5</div>
<input class="slider" type="range" min="0" max="10" value="5" id="${id}"
oninput="document.getElementById('wert_${id}').innerText=this.value">`;
});
html+='</div>';
});

html+=`<button onclick="absenden()">Bewertung absenden</button>`;
document.getElementById('projekt').innerHTML=html;
}

async function absenden(){
const name=document.getElementById('schueler').value.trim();
if(!name){alert('Bitte Namen eingeben');return;}
const bewertung={};
aktuellesProjekt.gruppen.forEach(g=>{
bewertung[g]={};
aktuellesProjekt.kriterien.forEach(k=>{
bewertung[g][k]=Number(document.getElementById(g+"_"+k).value);
});
});
showLoader(true);
try{
await fetch(API,{method:'POST',body:JSON.stringify({
projektCode:aktuellesProjekt.code,
schueler:name,
bewertung:bewertung
})});
document.getElementById('projekt').innerHTML=`
<div class="card success">
<h2>✅ Vielen Dank!</h2>
<p>Deine Bewertung wurde gespeichert.</p>
</div>`;
}finally{showLoader(false);}
}

const params=new URLSearchParams(location.search);
const code=params.get("code");
if(code){document.getElementById("code").value=code;laden();}
</script>
</body>
</html>
