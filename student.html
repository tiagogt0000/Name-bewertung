```html
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projektbewertung</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --card2:#334155;
    --accent:#3b82f6;
    --success:#22c55e;
    --danger:#ef4444;
    --text:#f8fafc;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:var(--card);
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

h1{
    text-align:center;
}

input[type=text]{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:var(--card2);
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:var(--accent);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:disabled{
    opacity:0.6;
}

.gruppe{
    background:var(--card);
    padding:20px;
    border-radius:20px;
    margin-top:20px;
}

.kriterium{
    margin-top:20px;
}

.slider{
    width:100%;
}

.wert{
    text-align:right;
    font-weight:bold;
    color:#60a5fa;
}

.loader{
    width:60px;
    height:60px;
    border:6px solid rgba(255,255,255,.15);
    border-top:6px solid white;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.loading{
    text-align:center;
    padding:40px;
}

.success{
    text-align:center;
    padding:40px;
}

.success h2{
    color:var(--success);
}

.fehler{
    color:var(--danger);
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>📋 Projektbewertung</h1>

<div class="card" id="start">

    <input
        id="code"
        type="text"
        placeholder="Projektcode">

    <br><br>

    <button onclick="laden()">
        Projekt laden
    </button>

    <div id="fehler" class="fehler"></div>

</div>

<div id="projekt"></div>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbxeoaj9MlKorhn9-VqiUM3JgK1KwJMWcMv4J9ZPN7vhDAhOqF0_rQNB82e6zZ5aD30e/exec";

let aktuellesProjekt = null;

async function laden(){

    const code =
        document.getElementById("code").value.trim();

    if(!code){
        document.getElementById("fehler").innerText =
            "Bitte Projektcode eingeben";
        return;
    }

    document.getElementById("projekt").innerHTML = `
        <div class="loading">
            <div class="loader"></div>
            <h3>Projekt wird geladen...</h3>
        </div>
    `;

    try{

        const response = await fetch(API,{
            method:"POST",
            body:JSON.stringify({
                action:"getProject",
                code:code
            })
        });

        const projekt = await response.json();

        aktuellesProjekt = projekt;

        anzeigen(projekt);

    }catch(err){

        document.getElementById("projekt").innerHTML = `
            <div class="card">
                Fehler beim Laden.
            </div>
        `;
    }
}

function anzeigen(projekt){

    let html = `
        <div class="card">
            <h2>${projekt.titel}</h2>
            <p>Klasse ${projekt.klasse}</p>

            <input
                id="schueler"
                type="text"
                placeholder="Dein Name">
        </div>
    `;

    projekt.gruppen.forEach(gruppe=>{

        html += `
            <div class="gruppe">
                <h2>Gruppe ${gruppe}</h2>
        `;

        projekt.kriterien.forEach(kriterium=>{

            const id =
                gruppe + "_" + kriterium;

            html += `
                <div class="kriterium">

                    <label>
                        ${kriterium}
                    </label>

                    <div
                        class="wert"
                        id="wert_${id}">
                        5
                    </div>

                    <input
                        class="slider"
                        type="range"
                        min="0"
                        max="10"
                        value="5"
                        id="${id}"
                        oninput="
                        document.getElementById(
                        'wert_${id}'
                        ).innerText=this.value">

                </div>
            `;
        });

        html += `</div>`;
    });

    html += `
        <br>

        <button
            id="sendenBtn"
            onclick="absenden()">
            Bewertung absenden
        </button>
    `;

    document.getElementById("projekt")
        .innerHTML = html;
}

async function absenden(){

    const name =
        document.getElementById("schueler")
        .value.trim();

    if(!name){
        alert("Bitte Namen eingeben");
        return;
    }

    const bewertung = {};

    aktuellesProjekt.gruppen.forEach(gruppe=>{

        bewertung[gruppe] = {};

        aktuellesProjekt.kriterien.forEach(kriterium=>{

            bewertung[gruppe][kriterium] =
                Number(
                    document.getElementById(
                        gruppe + "_" + kriterium
                    ).value
                );
        });
    });

    const btn =
        document.getElementById("sendenBtn");

    btn.disabled = true;
    btn.innerText = "Speichern...";

    try{

        await fetch(API,{
            method:"POST",
            body:JSON.stringify({
                projektCode:
                    aktuellesProjekt.code,
                schueler:name,
                bewertung:bewertung
            })
        });

        document.getElementById("projekt")
            .innerHTML = `
            <div class="success">
                <h2>✅ Vielen Dank!</h2>
                <p>
                    Deine Bewertung wurde gespeichert.
                </p>
            </div>
        `;

    }catch(err){

        btn.disabled = false;
        btn.innerText =
            "Bewertung absenden";

        alert(
            "Fehler beim Speichern"
        );
    }
}

const params =
    new URLSearchParams(
        window.location.search
    );

const codeAusUrl =
    params.get("code");

if(codeAusUrl){

    document.getElementById("code")
        .value = codeAusUrl;

    laden();
}

</script>

</body>
</html>
